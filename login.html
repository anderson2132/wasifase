<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WasiSafe - Acceder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div style="max-width: 440px; width: 100%;">

    <div class="auth-card">
      <!-- Logo -->
      <a href="index.html" class="auth-logo">
        <div class="logo-icon"><i class="fa-solid fa-shield-heart"></i></div>
        WasiSafe
      </a>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="loginForm">Iniciar sesión</button>
        <button class="auth-tab" data-tab="registerForm">Crear cuenta</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form">
        <!-- Google -->
        <button type="button" class="btn-google" onclick="simulateGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continuar con Google
        </button>

        <div class="divider">o ingresa con tu email</div>

        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="tu@email.com" value="demo@wasisafe.pe">
        </div>
        <div class="form-group">
          <label for="loginPassword">
            Contraseña
            <a href="#" style="float:right;color:#2563EB;font-weight:500;font-size:0.78rem;">¿Olvidaste tu contraseña?</a>
          </label>
          <div style="position:relative;">
            <input type="password" id="loginPassword" placeholder="••••••••" value="demo1234" style="padding-right: 2.5rem;">
            <button type="button" onclick="togglePassword('loginPassword', this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#9CA3AF;cursor:pointer;padding:0;">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.25rem;">
          <input type="checkbox" id="rememberMe" checked style="width:auto;">
          <label for="rememberMe" style="margin:0;font-size:0.85rem;font-weight:500;">Recordar sesión</label>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="padding:0.875rem;">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          Iniciar sesión
        </button>

        <div style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:#6B7280;">
          ¿No tienes cuenta? <a href="#" onclick="switchTab('registerForm')" style="color:#2563EB;font-weight:600;">Regístrate gratis</a>
        </div>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form" style="display:none;">
        <button type="button" class="btn-google" onclick="simulateGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Registrarse con Google
        </button>

        <div class="divider">o crea tu cuenta con email</div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" placeholder="Tu nombre">
          </div>
          <div class="form-group">
            <label>Apellido</label>
            <input type="text" placeholder="Tu apellido">
          </div>
        </div>

        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div style="position:relative;">
            <input type="password" id="regPassword" placeholder="Mínimo 8 caracteres" style="padding-right: 2.5rem;">
            <button type="button" onclick="togglePassword('regPassword', this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#9CA3AF;cursor:pointer;padding:0;">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" placeholder="Repite tu contraseña">
        </div>

        <div style="display:flex;align-items:flex-start;gap:0.5rem;margin-bottom:1.25rem;">
          <input type="checkbox" id="terms" style="width:auto;margin-top:2px;">
          <label for="terms" style="margin:0;font-size:0.8rem;font-weight:400;color:#6B7280;line-height:1.5;">
            Acepto los <a href="#" style="color:#2563EB;">Términos de Servicio</a> y la <a href="#" style="color:#2563EB;">Política de Privacidad</a>. Entiendo que mis datos son tratados conforme a la Ley 29733.
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="padding:0.875rem;">
          <i class="fa-solid fa-user-plus"></i>
          Crear cuenta gratuita
        </button>

        <div style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:#6B7280;">
          ¿Ya tienes cuenta? <a href="#" onclick="switchTab('loginForm')" style="color:#2563EB;font-weight:600;">Inicia sesión</a>
        </div>
      </form>
    </div>

    <!-- Trust indicators -->
    <div style="display:flex;justify-content:center;gap:1.5rem;margin-top:1.5rem;flex-wrap:wrap;">
      <span style="font-size:0.75rem;color:#9CA3AF;display:flex;align-items:center;gap:0.3rem;">
        <i class="fa-solid fa-shield-halved" style="color:#10B981;"></i> SSL Seguro
      </span>
      <span style="font-size:0.75rem;color:#9CA3AF;display:flex;align-items:center;gap:0.3rem;">
        <i class="fa-solid fa-lock" style="color:#10B981;"></i> Datos encriptados
      </span>
      <span style="font-size:0.75rem;color:#9CA3AF;display:flex;align-items:center;gap:0.3rem;">
        <i class="fa-solid fa-eye-slash" style="color:#10B981;"></i> Privacidad garantizada
      </span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  } else {
    input.type = 'password';
    btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
  }
}

function switchTab(formId) {
  const tabs = document.querySelectorAll('.auth-tab');
  const forms = document.querySelectorAll('.auth-form');
  tabs.forEach(t => {
    t.classList.toggle('active', t.dataset.tab === formId);
  });
  forms.forEach(f => {
    f.style.display = f.id === formId ? 'block' : 'none';
  });
}

function simulateGoogle() {
  const btn = event.currentTarget;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando con Google...';
  btn.disabled = true;
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
}
</script>
</body>
</html>
